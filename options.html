<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title data-i18n="options_title"></title>
    <link rel="stylesheet" href="options.css">
</head>
<body><div class="container">
    <div class="option">
        <label for="concurrency" data-i18n="options_concurrency"></label>
        <input type="number" id="concurrency" min="1" max="10" value="3">
    </div>
    <div class="option">
        <label for="interval" data-i18n="options_interval"></label>
        <input type="number" id="interval" min="0" value="500">
    </div>
    <div class="option">
        <label for="retries" data-i18n="options_retries"></label>
        <input type="number" id="retries" min="0" max="5" value="3">
    </div>
    <button id="saveBtn" data-i18n="options_save"></button>
    <div id="statusDiv"></div>
</div>
<script src="i18n.js"></script>
<script src="options.js"></script>
</body>
</html>
